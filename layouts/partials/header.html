<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="{{ "/" | relLangURL }}" class="site-logo">
        <span class="logo-icon">&#9670;</span>
        <span class="logo-text">{{ .Site.Title }}</span>
      </a>
      <nav class="main-nav" id="main-nav">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL | absLangURL }}" class="nav-link">{{ .Name }}</a>
        {{ end }}
      </nav>
      <div class="header-actions">
        {{ range .Translations }}
          <a href="{{ .Permalink }}" class="lang-switch">{{ .Language.LanguageName }}</a>
        {{ end }}
        {{ if not .Translations }}
          {{ if eq .Language.Lang "en" }}
            <a href="/ar/" class="lang-switch">العربية</a>
          {{ else }}
            <a href="/en/" class="lang-switch">English</a>
          {{ end }}
        {{ end }}
        <button class="mobile-menu-btn" onclick="document.getElementById('main-nav').classList.toggle('show')" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </div>
</header>
